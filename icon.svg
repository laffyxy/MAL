<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Accent Gradient for Borders -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="50%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#f472b6" />
    </linearGradient>

    <!-- Glowing Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Card Background Gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03" />
    </linearGradient>
  </defs>

  <!-- Base Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Outer Glowing Circular Frame -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#accentGrad)" stroke-width="4" filter="url(#glow)" opacity="0.3" />
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#accentGrad)" stroke-width="2" />

  <!-- Decorative Background Waves -->
  <path d="M 120 380 Q 256 420 392 380" fill="none" stroke="url(#accentGrad)" stroke-width="3" opacity="0.15" />
  <path d="M 90 410 Q 256 460 422 410" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.1" />

  <!-- Malayalam Bubble / Card -->
  <g transform="translate(110, 150)">
    <!-- Card Frame -->
    <rect width="130" height="130" rx="24" fill="url(#cardGrad)" stroke="url(#accentGrad)" stroke-width="1.5" />
    <!-- Glowing Accent behind -->
    <rect width="130" height="130" rx="24" fill="none" stroke="#818cf8" stroke-width="3" filter="url(#glow)" opacity="0.2" />
    <!-- Malayalam Character 'അ' -->
    <text x="65" y="85" font-family="'Inter', 'Noto Sans Malayalam', sans-serif" font-size="64" font-weight="bold" fill="#ffffff" text-anchor="middle">അ</text>
  </g>

  <!-- English Bubble / Card -->
  <g transform="translate(272, 230)">
    <!-- Card Frame -->
    <rect width="130" height="130" rx="24" fill="url(#cardGrad)" stroke="url(#accentGrad)" stroke-width="1.5" />
    <!-- Glowing Accent behind -->
    <rect width="130" height="130" rx="24" fill="none" stroke="#f472b6" stroke-width="3" filter="url(#glow)" opacity="0.2" />
    <!-- English Character 'A' -->
    <text x="65" y="88" font-family="'Outfit', 'Inter', sans-serif" font-size="68" font-weight="bold" fill="#ffffff" text-anchor="middle">A</text>
  </g>

  <!-- Exchange/Translation Arrow Path -->
  <path d="M 256 190 Q 320 180 320 220" fill="none" stroke="url(#accentGrad)" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" />
  <path d="M 256 320 Q 192 330 192 290" fill="none" stroke="url(#accentGrad)" stroke-width="4" stroke-linecap="round" />

  <!-- Stylish connection element in the center -->
  <circle cx="256" cy="256" r="16" fill="url(#accentGrad)" filter="url(#glow)" />
  <circle cx="256" cy="256" r="8" fill="#ffffff" />
</svg>
